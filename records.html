<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Records — Dr. Ferid Clinic</title>

    <script>
        if (localStorage.getItem('clinicDarkMode') !== 'false') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        clinic: { light: '#dbeafe', DEFAULT: '#2563eb', dark: '#1e40af' }
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }

        /* ===== Dark Mode (same palette as the main site) ===== */
        html.dark body { background-color: #0f172a; color: #cbd5e1; }
        html.dark .glass-nav { background: rgba(15, 23, 42, 0.9) !important; border-bottom: 1px solid rgba(255,255,255,0.08) !important; }
        html.dark .bg-white { background-color: #1e293b !important; }
        html.dark .bg-slate-50 { background-color: #1e293b !important; }
        html.dark .bg-slate-100 { background-color: #334155 !important; }
        html.dark .bg-slate-200 { background-color: #334155 !important; }
        html.dark .bg-slate-800 { background-color: #0b1120 !important; }
        html.dark .bg-slate-900 { background-color: #020617 !important; }
        html.dark .border-slate-100 { border-color: #334155 !important; }
        html.dark .border-slate-200 { border-color: #334155 !important; }
        html.dark .border-slate-300 { border-color: #475569 !important; }
        html.dark .text-slate-800 { color: #e2e8f0 !important; }
        html.dark .text-slate-700 { color: #cbd5e1 !important; }
        html.dark .text-slate-600 { color: #94a3b8 !important; }
        html.dark .text-slate-500 { color: #94a3b8 !important; }
        html.dark .text-slate-400 { color: #64748b !important; }
        html.dark .bg-red-50 { background-color: #450a0a !important; }
        html.dark .bg-red-100 { background-color: #450a0a !important; }
        html.dark .bg-green-50 { background-color: #052e16 !important; }
        html.dark .bg-green-100 { background-color: #052e16 !important; }
        html.dark .text-red-500 { color: #f87171 !important; }
        html.dark .text-red-600 { color: #f87171 !important; }
        html.dark .text-green-500 { color: #4ade80 !important; }
        html.dark .text-green-600 { color: #4ade80 !important; }
        html.dark .text-green-700 { color: #4ade80 !important; }
    </style>
</head>
<body class="min-h-screen">
    <header class="glass-nav sticky top-0 z-40 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center max-w-5xl">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-slate-400 hover:text-clinic transition-colors p-2 bg-slate-50 rounded-full hover:bg-clinic-light" title="Back to Site">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <div class="flex items-center gap-2">
                    <div class="bg-slate-800 text-white p-2.5 rounded-xl shadow-md"><i class="fa-solid fa-folder-open text-lg"></i></div>
                    <div>
                        <h1 class="text-lg font-black text-slate-800">Patient Records</h1>
                        <p class="text-[11px] text-slate-500 font-bold -mt-0.5">Dr. Ferid Clinic — Staff only</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.toggleDarkMode()" id="dark-toggle-btn" class="text-slate-400 hover:text-clinic transition-colors p-2 bg-slate-50 rounded-full hover:bg-clinic-light" title="Dark mode">
                    <i class="fa-solid fa-moon text-lg"></i>
                </button>
                <button id="records-logout-btn" onclick="window.staffLogout()" class="hidden text-xs font-bold text-slate-400 hover:text-red-500 transition-colors px-3 py-2 rounded-lg hover:bg-red-50">Log Out</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-5xl">

        <!-- Login section -->
        <div id="records-login-section" class="max-w-sm mx-auto py-16">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><i class="fa-solid fa-lock text-4xl text-slate-400"></i></div>
                <h2 class="text-lg font-black text-slate-800">Staff Login</h2>
                <p class="text-sm text-slate-500 font-bold mt-1">Sign in to access patient records</p>
            </div>
            <div class="space-y-3 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                <input type="email" id="staff-login-email" autocomplete="username" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800" placeholder="Email">
                <input type="password" id="staff-login-password" autocomplete="current-password" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800" placeholder="Password">
                <p id="staff-login-error" class="hidden text-red-500 text-sm font-bold text-center"></p>
                <button onclick="window.staffLogin()" class="w-full bg-slate-800 text-white font-black text-lg py-4 rounded-2xl hover:bg-slate-900 transition-colors flex items-center justify-center gap-2 shadow-lg"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
            </div>
        </div>

        <!-- Main records content (shown once logged in) -->
        <div id="records-main-section" class="hidden space-y-8">

            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-grow">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="records-search-input" oninput="window.searchPatients()" placeholder="Search by name or ID..." class="w-full pl-11 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800 shadow-sm">
                </div>
                <button onclick="window.openAddPatientForm()" class="bg-clinic text-white font-bold px-5 py-3 rounded-xl hover:bg-clinic-dark transition-colors shadow-md whitespace-nowrap"><i class="fa-solid fa-plus mr-1"></i> Add Patient</button>
            </div>

            <!-- Recent visits: today / yesterday / 2 days ago -->
            <div id="recent-visits-section">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-wide mb-1">Today</p>
                        <p id="today-date-label" class="text-sm font-bold text-slate-600 mb-3"></p>
                        <div id="today-visits-list" class="space-y-2"></div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-wide mb-1">Yesterday</p>
                        <p id="yesterday-date-label" class="text-sm font-bold text-slate-600 mb-3"></p>
                        <div id="yesterday-visits-list" class="space-y-2"></div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm">
                        <p class="text-xs font-black text-slate-400 uppercase tracking-wide mb-1">2 Days Ago</p>
                        <p id="twodaysago-date-label" class="text-sm font-bold text-slate-600 mb-3"></p>
                        <div id="twodaysago-visits-list" class="space-y-2"></div>
                    </div>
                </div>
            </div>

            <!-- Search results (shown instead of recent-visits while searching) -->
            <div id="records-list-step" class="hidden space-y-3"></div>

            <!-- Add patient form -->
            <div id="records-add-step" class="hidden max-w-md mx-auto space-y-4 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
                <h4 class="font-black text-slate-800 text-lg mb-2">New Patient</h4>
                <div>
                    <label class="text-xs font-bold text-slate-500 mb-1 block">Full Name *</label>
                    <input type="text" id="new-patient-name" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800" placeholder="Patient name">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 mb-1 block">Patient ID (auto-assigned)</label>
                    <input type="text" id="new-patient-id" readonly class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-slate-100 font-bold text-slate-500 cursor-not-allowed">
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-500 mb-1 block">Phone Number</label>
                    <input type="tel" id="new-patient-phone" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800" placeholder="07xxxxxxxxx">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="window.backToPatientList()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">Cancel</button>
                    <button onclick="window.saveNewPatient()" class="flex-1 bg-clinic text-white font-bold py-3 rounded-xl hover:bg-clinic-dark transition-colors shadow-md">Save Patient</button>
                </div>
            </div>

            <!-- Patient detail -->
            <div id="records-detail-step" class="hidden space-y-5">
                <button onclick="window.backToPatientList()" class="text-sm font-bold text-slate-500 hover:text-clinic flex items-center gap-1"><i class="fa-solid fa-arrow-left"></i> Back</button>

                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                    <div class="flex justify-between items-start">
                        <div class="flex-grow">
                            <div class="flex items-center gap-2">
                                <h4 id="detail-patient-name" class="text-xl font-black text-slate-800"></h4>
                                <button onclick="window.toggleNameEdit()" class="text-xs font-bold text-clinic hover:underline flex-shrink-0">Edit</button>
                            </div>
                            <div id="name-edit-row" class="hidden mt-2 flex gap-2 max-w-xs">
                                <input type="text" id="edit-name-input" class="flex-grow px-3 py-2 rounded-lg border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800 text-sm" placeholder="Full name">
                                <button onclick="window.savePatientName()" class="bg-clinic text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-clinic-dark transition-colors">Save</button>
                            </div>

                            <p id="detail-patient-id" class="text-sm text-slate-500 font-bold mt-1"></p>

                            <div class="flex items-center gap-2 mt-1">
                                <p id="detail-patient-phone" class="text-sm text-slate-500 font-bold"></p>
                                <button onclick="window.togglePhoneEdit()" class="text-xs font-bold text-clinic hover:underline">Edit</button>
                            </div>
                            <div id="phone-edit-row" class="hidden mt-2 flex gap-2 max-w-xs">
                                <input type="tel" id="edit-phone-input" class="flex-grow px-3 py-2 rounded-lg border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800 text-sm" placeholder="07xxxxxxxxx">
                                <button onclick="window.savePatientPhone()" class="bg-clinic text-white font-bold px-4 py-2 rounded-lg text-sm hover:bg-clinic-dark transition-colors">Save</button>
                            </div>
                        </div>
                        <button onclick="window.deletePatientPrompt()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-colors flex-shrink-0" title="Delete patient"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="grid grid-cols-4 gap-1.5 mt-4">
                        <button onclick="window.sendWhatsAppReminder('تركيب')" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition-colors shadow-md flex flex-col items-center justify-center gap-0.5 text-[11px]">
                            <i class="fa-brands fa-whatsapp text-sm"></i> تركيب
                        </button>
                        <button onclick="window.sendWhatsAppReminder('زراعة')" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition-colors shadow-md flex flex-col items-center justify-center gap-0.5 text-[11px]">
                            <i class="fa-brands fa-whatsapp text-sm"></i> زراعة
                        </button>
                        <button onclick="window.sendWhatsAppReminder('تقويم')" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg transition-colors shadow-md flex flex-col items-center justify-center gap-0.5 text-[11px]">
                            <i class="fa-brands fa-whatsapp text-sm"></i> تقويم
                        </button>
                        <button onclick="document.getElementById('general-photo-input').click()" class="bg-clinic hover:bg-clinic-dark text-white font-bold py-2 rounded-lg transition-colors shadow-md flex flex-col items-center justify-center gap-0.5 text-[11px]">
                            <i class="fa-solid fa-camera text-sm"></i> Photo
                        </button>
                        <input type="file" id="general-photo-input" accept="image/*" multiple class="hidden" onchange="window.handleGeneralPhotoSelect(event)">
                    </div>

                    <div id="general-photos-section" class="hidden mt-4">
                        <p class="text-xs font-black text-slate-500 mb-2 uppercase tracking-wide">Patient Photos</p>
                        <div id="general-photos-row" class="flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="window.openPatientSummary()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2 mt-4">
                        <i class="fa-solid fa-file-lines"></i> Patient Summary
                    </button>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h5 class="font-black text-slate-800 flex items-center gap-2"><i class="fa-solid fa-notes-medical text-clinic"></i> Case History</h5>
                        <button onclick="window.openAddCaseEntryForm()" class="text-sm font-bold text-clinic hover:bg-clinic-light px-3 py-1.5 rounded-lg transition-colors border border-clinic/20"><i class="fa-solid fa-plus mr-1"></i> Add Entry</button>
                    </div>
                    <div id="case-history-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="message-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[200] p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl transform transition-all scale-95 opacity-0 text-center" id="message-modal-content">
            <div id="message-icon" class="text-6xl mb-6"></div>
            <h3 id="message-title" class="text-2xl font-black mb-3 text-slate-800"></h3>
            <p id="message-body" class="text-slate-600 mb-8 leading-relaxed font-medium"></p>
            <button onclick="closeMessageModal()" class="w-full bg-slate-800 text-white font-bold text-lg py-4 rounded-xl hover:bg-slate-900 transition-colors shadow-lg">OK</button>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[101] p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
            <h3 id="confirm-title" class="text-xl font-black mb-4 text-slate-800">Confirm Action</h3>
            <p id="confirm-body" class="text-slate-600 mb-6 font-medium"></p>
            <div class="flex gap-3">
                <button id="confirm-yes-btn" class="flex-1 bg-red-600 text-white font-bold py-3 rounded-xl hover:bg-red-700">Yes, I'm sure</button>
                <button onclick="closeConfirmModal()" class="flex-1 bg-slate-100 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-200">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Case Entry Modal -->
    <div id="add-entry-modal" class="fixed inset-0 bg-slate-900/70 hidden items-center justify-center z-[150] p-4 backdrop-blur-md" dir="ltr" lang="en">
        <div class="bg-slate-50 rounded-3xl w-full max-w-2xl shadow-2xl max-h-[92vh] flex flex-col border border-slate-200">
            <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-gradient-to-r from-slate-800 to-slate-700 rounded-t-3xl">
                <div class="flex items-center gap-3">
                    <div class="bg-white/10 text-white p-3 rounded-xl"><i class="fa-solid fa-notes-medical text-xl"></i></div>
                    <div>
                        <h3 id="entry-modal-title" class="text-xl font-black text-white">New Case Entry</h3>
                        <p id="entry-modal-patient-name" class="text-xs text-slate-300 font-bold mt-0.5"></p>
                    </div>
                </div>
                <button onclick="window.cancelAddCaseEntry()" class="text-slate-300 hover:text-white hover:bg-white/10 transition-colors p-2 rounded-full w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <div class="p-6 overflow-y-auto space-y-5">
                <div>
                    <label class="text-xs font-black text-slate-500 mb-1.5 block uppercase tracking-wide">Date</label>
                    <input type="date" id="new-entry-date" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800 shadow-sm">
                </div>

                <div>
                    <label class="text-xs font-black text-slate-500 mb-1.5 block uppercase tracking-wide">Notes</label>
                    <textarea id="new-entry-notes" rows="6" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-medium text-slate-800 shadow-sm leading-relaxed" placeholder="Write freely — treatment details, observations, plan for next visit..."></textarea>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-black text-slate-500 mb-2 block uppercase tracking-wide">Permanent Teeth</label>
                        <div class="bg-white border-2 border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200 bg-slate-50">
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Upper Right</p>
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Upper Left</p>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200">
                                <div class="flex flex-wrap gap-1 p-2 justify-end" id="ur-teeth-row"></div>
                                <div class="flex flex-wrap gap-1 p-2 justify-start" id="ul-teeth-row"></div>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200">
                                <div class="flex flex-wrap gap-1 p-2 justify-end" id="lr-teeth-row"></div>
                                <div class="flex flex-wrap gap-1 p-2 justify-start" id="ll-teeth-row"></div>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 bg-slate-50">
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Lower Right</p>
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Lower Left</p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs font-black text-slate-500 mb-2 block uppercase tracking-wide">Deciduous Teeth (Baby Teeth)</label>
                        <div class="bg-white border-2 border-slate-200 rounded-xl overflow-hidden shadow-sm">
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200 bg-slate-50">
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Upper Right</p>
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Upper Left</p>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200">
                                <div class="flex flex-wrap gap-1 p-2 justify-end" id="d-ur-teeth-row"></div>
                                <div class="flex flex-wrap gap-1 p-2 justify-start" id="d-ul-teeth-row"></div>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 border-b border-slate-200">
                                <div class="flex flex-wrap gap-1 p-2 justify-end" id="d-lr-teeth-row"></div>
                                <div class="flex flex-wrap gap-1 p-2 justify-start" id="d-ll-teeth-row"></div>
                            </div>
                            <div class="grid grid-cols-2 divide-x divide-slate-200 bg-slate-50">
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Lower Right</p>
                                <p class="text-center font-black text-slate-600 py-2 text-[11px] uppercase tracking-wide">Lower Left</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-black text-slate-500 mb-1.5 block uppercase tracking-wide">Procedure</label>
                    <select id="new-entry-procedure" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-clinic bg-white font-bold text-slate-800 shadow-sm">
                        <option value="">-- Select procedure --</option>
                        <option value="Exo">Exo (Extraction)</option>
                        <option value="Filling">Filling</option>
                        <option value="Endo">Endo (Root Canal)</option>
                        <option value="S+P">S+P (Scaling &amp; Polishing)</option>
                        <option value="Implants">Implants</option>
                        <option value="Crown & Bridge">Crown &amp; Bridge</option>
                    </select>
                </div>

                <div>
                    <label class="text-xs font-black text-slate-500 mb-1.5 block uppercase tracking-wide">Photos</label>
                    <div class="bg-white border-2 border-slate-200 rounded-xl p-4 shadow-sm">
                        <div id="entry-photos-row" class="flex flex-wrap gap-3"></div>
                        <input type="file" id="entry-photo-input" accept="image/*" multiple class="hidden" onchange="window.handlePhotoSelect(event)">
                        <button type="button" onclick="document.getElementById('entry-photo-input').click()" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-xl py-3 text-slate-400 font-bold text-sm hover:border-clinic hover:text-clinic transition-colors flex items-center justify-center gap-2">
                            <i class="fa-solid fa-camera"></i> Add Photo
                        </button>
                        <p id="photo-upload-status" class="hidden text-xs font-bold text-clinic text-center mt-2"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-green-700 mb-1.5 block uppercase tracking-wide">Paid</label>
                        <input type="number" id="new-entry-paid" min="0" class="w-full px-4 py-3 rounded-xl border-2 border-green-200 focus:outline-none focus:border-green-500 bg-green-50 font-black text-green-700 shadow-sm" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs font-black text-red-500 mb-1.5 block uppercase tracking-wide">Remaining</label>

        window.showConfirm = function(title, message, onYes) {

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';

        }



        // This page is staff-only: no anonymous fallback like the main site.
        function initRecordsAuth() {
            if (!auth) return;
            onAuthStateChanged(auth, (user) => {
                if (user && !user.isAnonymous) {
                    document.getElementById('records-login-section').classList.add('hidden');
                    document.getElementById('records-main-section').classList.remove('hidden');

                    document.getElementById('records-login-section').classList.remove('hidden');

                    document.getElementById('records-logout-btn').classList.add('hidden');
                    window.currentDetailPatientId = null;

        }

        function startRecordsListener() {
            const recordsCol = collection(db, 'artifacts', appId, 'public', 'data', 'patient_records');
            onSnapshot(recordsCol, (snapshot) => {
                window.allPatients = [];
                snapshot.forEach(docSnap => {
                    window.allPatients.push({ id: docSnap.id, ...docSnap.data() });
                });
                if (document.getElementById('records-list-step').classList.contains('hidden')) {
                    renderRecentVisits();
                } else {
                    window.searchPatients();
                }
                if (window.currentDetailPatientId) window.refreshDetailView();
            }, (error) => {
                console.error("Patient Records Sync Error:", error);
                if (error.code === 'permission-denied') {
                    document.getElementById('recent-visits-section').innerHTML = `<div class="text-center py-10"><p class="text-red-500 font-bold mb-2">Access denied — you're not logged in as staff.</p><p class="text-slate-400 text-sm">Log out and log back in.</p></div>`;

        window.staffLogin = async function() {
            const email = document.getElementById('staff-login-email').value.trim();

            errorEl.classList.add('hidden');

                errorEl.textContent = 'Please enter both email and password.';

        // Recent-visits dashboard: today / yesterday / 2 days ago, based on case entry dates
        function isoDateOffset(daysAgo) {
            const d = new Date();
            d.setDate(d.getDate() - daysAgo);
            return d.toISOString().split('T')[0];
        }

        function friendlyDateLabel(iso) {
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderRecentVisits() {
            document.getElementById('recent-visits-section').classList.remove('hidden');
            document.getElementById('records-list-step').classList.add('hidden');

            const todayIso = isoDateOffset(0);
            const yestIso = isoDateOffset(1);
            const twoIso = isoDateOffset(2);

            document.getElementById('today-date-label').textContent = friendlyDateLabel(todayIso);
            document.getElementById('yesterday-date-label').textContent = friendlyDateLabel(yestIso);
            document.getElementById('twodaysago-date-label').textContent = friendlyDateLabel(twoIso);

            const buckets = { [todayIso]: [], [yestIso]: [], [twoIso]: [] };
            window.allPatients.forEach(p => {
                const seenDates = new Set();
                (p.caseHistory || []).forEach(e => {
                    if (buckets[e.date] && !seenDates.has(e.date)) {
                        buckets[e.date].push(p);
                        seenDates.add(e.date);
                    }
                });
            });

            function renderCol(containerId, list) {
                const el = document.getElementById(containerId);
                if (list.length === 0) {
                    el.innerHTML = `<p class="text-xs text-slate-400 font-bold">No visits.</p>`;
                    return;
                }
                el.innerHTML = list.map(p => `
                    <button onclick="window.openPatientDetail('${p.id}')" class="w-full text-left bg-slate-50 hover:bg-clinic-light border border-slate-200 rounded-lg px-3 py-2 transition-colors">
                        <p class="font-bold text-slate-800 text-sm">${escapeHtml(p.name)}</p>
                        <p class="text-[11px] text-slate-500 font-bold">${p.patientId ? 'ID: ' + escapeHtml(p.patientId) : ''}</p>
                    </button>`).join('');
            }

            renderCol('today-visits-list', buckets[todayIso]);
            renderCol('yesterday-visits-list', buckets[yestIso]);
            renderCol('twodaysago-visits-list', buckets[twoIso]);
        }

        window.searchPatients = function() {
            const raw = (document.getElementById('records-search-input').value || '').trim();
            const term = raw.toLowerCase();

            if (!term) {
                renderRecentVisits();
                return;
            }

            document.getElementById('recent-visits-section').classList.add('hidden');
            document.getElementById('records-list-step').classList.remove('hidden');

            let list;
            if (/^\d+$/.test(raw)) {
                const targetNum = parseInt(raw, 10);
                list = window.allPatients.filter(p => parseInt(p.patientId, 10) === targetNum);
            } else {
                list = window.allPatients.filter(p =>
                    (p.name || '').toLowerCase().includes(term) || (p.patientId || '').toLowerCase().includes(term)
                );
            }
            renderPatientList(list);
        };

        function renderPatientList(list) {
            const container = document.getElementById('records-list-step');

                return;

                <button onclick="window.openPatientDetail('${p.id}')" class="w-full text-left bg-white border border-slate-200 rounded-xl p-4 flex justify-between items-center hover:border-clinic transition-colors shadow-sm">

                        <p class="font-black text-slate-800">${escapeHtml(p.name)}</p>
                        <p class="text-xs text-slate-500 font-bold mt-0.5">${p.patientId ? 'ID: ' + escapeHtml(p.patientId) : 'No ID'} ${p.phone ? ' · ' + escapeHtml(p.phone) : ''}</p>

        function getNextPatientId() {
            let maxId = 0;
            window.allPatients.forEach(p => {
                const n = parseInt(p.patientId, 10);
                if (!isNaN(n) && n > maxId) maxId = n;
            });
            return String(maxId + 1);

        // Shows the add-patient form or patient-detail view, hiding the recent-visits/search list beneath it.
        function recordsShowStep(stepId) {

                window.saveNewPatient = async function() {
            const name = document.getElementById('new-patient-name').value.trim();
            const patientId = document.getElementById('new-patient-id').value.trim();
            const phone = document.getElementById('new-patient-phone').value.trim();
            if (!name) {
                window.showMessage('Missing Name', 'Please enter the patient\'s full name.', 'error');
                return;
            }
            if (!auth?.currentUser || !db) {
                window.showMessage('Not Connected', 'Please check your internet connection.', 'error');
                return;
            }

            const duplicates = window.allPatients.filter(p => (p.name || '').trim().toLowerCase() === name.toLowerCase());
            if (duplicates.length > 0) {
                const existingList = duplicates.map(p => `#${p.patientId || '?'}${p.phone ? ' (' + p.phone + ')' : ''}`).join(', ');
                window.showConfirm(
                    'Possible Duplicate',
                    `A patient named "${name}" already exists: ${existingList}. Add another patient with the same name anyway?`,
                    () => actuallySaveNewPatient(name, patientId, phone)
                );
                return;
            }

            actuallySaveNewPatient(name, patientId, phone);
        };

        async function actuallySaveNewPatient(name, patientId, phone) {
            try {
                const newRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'patient_records'));
                await setDoc(newRef, {
                    name, patientId, phone,
                    caseHistory: [],
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
                window.showMessage('Patient Added', name + ' was saved as patient #' + patientId + '.', 'success');
                window.backToPatientList();
            } catch (e) {
                console.error(e);
                window.showMessage('Save Failed', 'Could not save the patient. Please try again.', 'error');
            }
        };

                        ${entry.teeth && entry.teeth.length ? `<p class="text-xs font-bold text-slate-500 mt-2">Teeth: ${entry.teeth.join(', ')}${entry.procedure ? ' · ' + escapeHtml(entry.procedure) : ''}</p>` : (entry.procedure ? `<p class="text-xs font-bold text-slate-500 mt-2">${escapeHtml(entry.procedure)}</p>` : '')}
                        <div class="flex gap-2 mt-3">
                            <span class="bg-green-100 text-green-700 font-black text-sm px-3 py-1.5 rounded-lg">${Number(entry.paid || 0).toLocaleString()}</span>
                            ${(entry.remaining && entry.remaining > 0) ? `<span class="bg-red-100 text-red-600 font-black text-sm px-3 py-1.5 rounded-lg">${Number(entry.remaining).toLocaleString()}</span>` : ''}

                        ${entry.photos && entry.photos.length ? `<div class="flex flex-wrap gap-2 mt-3">${entry.photos.map(ph => `<a href="${ph.url}" target="_blank"><img src="${ph.url}" class="w-14 h-14 object-cover rounded-lg border border-slate-200 hover:opacity-80 transition-opacity"></a>`).join('')}</div>` : ''}
                    </div>

                    </div>

            `).join('');

        // Palmer notation: each quadrant grouped visually (Upper/Lower Right/Left boxes) rather than
        // with the traditional bracket symbols, which render inconsistently across devices.

        window.selectedTeeth = new Set();

        function toothButtonHtml(id, label) {
            return `<button type="button" onclick="window.toggleTooth('${id}')" data-tooth="${id}" class="tooth-btn w-8 h-8 flex-shrink-0 rounded-md border-2 border-slate-200 bg-white text-slate-700 text-xs font-bold hover:border-clinic transition-colors flex items-center justify-center">${label}</button>`;
        }

        function renderToothChart() {
            // Right-side columns run 8→1 (or E→A) outward-to-midline; left-side columns run the
            // opposite way — tooth "1"/"A" always sits closest to the centre divider, matching a real chart.
            document.getElementById('ur-teeth-row').innerHTML = [8,7,6,5,4,3,2,1].map(n => toothButtonHtml('UR' + n, n)).join('');
            document.getElementById('ul-teeth-row').innerHTML = [1,2,3,4,5,6,7,8].map(n => toothButtonHtml('UL' + n, n)).join('');
            document.getElementById('lr-teeth-row').innerHTML = [8,7,6,5,4,3,2,1].map(n => toothButtonHtml('LR' + n, n)).join('');
            document.getElementById('ll-teeth-row').innerHTML = [1,2,3,4,5,6,7,8].map(n => toothButtonHtml('LL' + n, n)).join('');

            // Deciduous (baby) teeth: lettered A (closest to midline) through E (outermost), 5 per quadrant.
            document.getElementById('d-ur-teeth-row').innerHTML = ['E','D','C','B','A'].map(l => toothButtonHtml('UR' + l, l)).join('');
            document.getElementById('d-ul-teeth-row').innerHTML = ['A','B','C','D','E'].map(l => toothButtonHtml('UL' + l, l)).join('');
            document.getElementById('d-lr-teeth-row').innerHTML = ['E','D','C','B','A'].map(l => toothButtonHtml('LR' + l, l)).join('');
            document.getElementById('d-ll-teeth-row').innerHTML = ['A','B','C','D','E'].map(l => toothButtonHtml('LL' + l, l)).join('');
        }

        window.toggleTooth = function(id) {
            const btn = document.querySelector(`.tooth-btn[data-tooth="${id}"]`);
            if (window.selectedTeeth.has(id)) {
                window.selectedTeeth.delete(id);
                btn.classList.remove('bg-clinic', 'border-clinic', 'text-white');
                btn.classList.add('bg-white', 'border-slate-200', 'text-slate-700');
            } else {
                window.selectedTeeth.add(id);
                btn.classList.add('bg-clinic', 'border-clinic', 'text-white');
                btn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
            }
        };

        // Sets the chart's visual selection directly (used both to clear it for a new entry,
        // and to pre-select the saved teeth when editing an existing one).
        function setSelectedTeethVisual(teethArray) {
            window.selectedTeeth = new Set(teethArray || []);
            document.querySelectorAll('.tooth-btn').forEach(btn => {
                const id = btn.getAttribute('data-tooth');
                if (window.selectedTeeth.has(id)) {
                    btn.classList.add('bg-clinic', 'border-clinic', 'text-white');
                    btn.classList.remove('bg-white', 'border-slate-200', 'text-slate-700');
                } else {
                    btn.classList.remove('bg-clinic', 'border-clinic', 'text-white');
                    btn.classList.add('bg-white', 'border-slate-200', 'text-slate-700');
                }
            });
        }

        function resetToothChart() {
            setSelectedTeethVisual([]);
        }


        window.editingEntryId = null;

        // Photo handling for the case entry modal
        window.existingEntryPhotos = [];   // {url, path} already uploaded (when editing)
        window.photosMarkedForDeletion = []; // paths of existing photos removed during this edit
        window.pendingPhotoFiles = [];     // {blob, previewUrl} selected but not yet uploaded

        // Resizes/compresses an image client-side before upload, to keep Storage usage low
        // across thousands of case-photo uploads over time.

        function compressImage(file, maxDim = 1600, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
                        else if (height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('Compression failed')), 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }


        window.handlePhotoSelect = async function(event) {
            const files = Array.from(event.target.files || []);
            event.target.value = ''; // allow selecting the same file again later
            for (const file of files) {
                try {
                    const blob = await compressImage(file);
                    window.pendingPhotoFiles.push({ blob, previewUrl: URL.createObjectURL(blob) });
                } catch (e) {
                    console.error('Photo compression error:', e);
                }
            }
            renderEntryPhotosRow();
        };

        window.removeExistingPhoto = function(index) {
            const removed = window.existingEntryPhotos.splice(index, 1)[0];
            if (removed) window.photosMarkedForDeletion.push(removed.path);
            renderEntryPhotosRow();
        };

        window.removePendingPhoto = function(index) {
            window.pendingPhotoFiles.splice(index, 1);
            renderEntryPhotosRow();
        };

        function renderEntryPhotosRow() {
            const row = document.getElementById('entry-photos-row');
            const existingHtml = window.existingEntryPhotos.map((p, i) => `
                <div class="relative w-20 h-20">
                    <img src="${p.url}" class="w-20 h-20 object-cover rounded-lg border border-slate-200">
                    <button type="button" onclick="window.removeExistingPhoto(${i})" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow-md"><i class="fa-solid fa-xmark"></i></button>
                </div>`).join('');
            const pendingHtml = window.pendingPhotoFiles.map((p, i) => `
                <div class="relative w-20 h-20">
                    <img src="${p.previewUrl}" class="w-20 h-20 object-cover rounded-lg border-2 border-clinic">
                    <button type="button" onclick="window.removePendingPhoto(${i})" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow-md"><i class="fa-solid fa-xmark"></i></button>
                </div>`).join('');
            row.innerHTML = existingHtml + pendingHtml || `<p class="text-xs text-slate-400 font-bold">No photos added yet.</p>`;
        }


        window.openAddCaseEntryForm = function(editEntryId) {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            const existingEntry = editEntryId && p ? (p.caseHistory || []).find(e => e.id === editEntryId) : null;
            window.editingEntryId = existingEntry ? editEntryId : null;

            window.existingEntryPhotos = existingEntry && existingEntry.photos ? [...existingEntry.photos] : [];
            window.photosMarkedForDeletion = [];
            window.pendingPhotoFiles = [];
            renderEntryPhotosRow();
            document.getElementById('photo-upload-status').classList.add('hidden');

            document.getElementById('entry-modal-title').textContent = existingEntry ? 'Edit Case Entry' : 'New Case Entry';
            document.getElementById('entry-modal-patient-name').textContent = p ? p.name + (p.patientId ? ' · ID ' + p.patientId : '') : '';
            document.getElementById('new-entry-date').value = existingEntry ? existingEntry.date : new Date().toISOString().split('T')[0];
            document.getElementById('new-entry-notes').value = existingEntry ? (existingEntry.notes || '') : '';
            document.getElementById('new-entry-paid').value = existingEntry && existingEntry.paid ? existingEntry.paid : '';
            document.getElementById('new-entry-remaining').value = existingEntry && existingEntry.remaining ? existingEntry.remaining : '';
            document.getElementById('new-entry-procedure').value = existingEntry ? (existingEntry.procedure || '') : '';
            setSelectedTeethVisual(existingEntry ? existingEntry.teeth : []);
            document.getElementById('add-entry-modal').classList.remove('hidden');
            document.getElementById('add-entry-modal').classList.add('flex');
            setTimeout(() => document.getElementById('new-entry-notes').focus(), 50);
        };

        window.cancelAddCaseEntry = function() {
            document.getElementById('add-entry-modal').classList.add('hidden');
            document.getElementById('add-entry-modal').classList.remove('flex');
        };

        window.saveCaseEntry = async function() {
            const date = document.getElementById('new-entry-date').value;
            const notes = document.getElementById('new-entry-notes').value.trim();
            const paid = parseFloat(document.getElementById('new-entry-paid').value) || 0;
            const remaining = parseFloat(document.getElementById('new-entry-remaining').value) || 0;
            const procedure = document.getElementById('new-entry-procedure').value;
            const quadrantOrder = { UR: 0, UL: 1, LR: 2, LL: 3 };
            const teeth = Array.from(window.selectedTeeth).sort((a, b) => {
                const qa = a.slice(0, 2), qb = b.slice(0, 2);
                if (qa !== qb) return quadrantOrder[qa] - quadrantOrder[qb];
                return parseInt(a.slice(2), 10) - parseInt(b.slice(2), 10);
            });
            if (!date) {
                window.showMessage('Missing Date', 'Please select a date for this entry.', 'error');
                return;
            }
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p || !db) return;

            const entryId = window.editingEntryId || (Date.now().toString(36) + Math.random().toString(36).slice(2, 7));
            const saveBtn = document.getElementById('save-entry-btn');
            const statusEl = document.getElementById('photo-upload-status');

            try {
                // Upload any newly-added photos first
                let newlyUploaded = [];
                if (window.pendingPhotoFiles.length > 0 && storage) {
                    if (saveBtn) saveBtn.disabled = true;
                    statusEl.classList.remove('hidden');
                    for (let i = 0; i < window.pendingPhotoFiles.length; i++) {
                        statusEl.textContent = `Uploading photo ${i + 1} of ${window.pendingPhotoFiles.length}...`;
                        const path = `patient_photos/${p.id}/${entryId}/${Date.now()}_${i}.jpg`;
                        const storageRef = ref(storage, path);
                        await uploadBytes(storageRef, window.pendingPhotoFiles[i].blob);
                        const url = await getDownloadURL(storageRef);
                        newlyUploaded.push({ url, path });
                    }
                    statusEl.textContent = 'Saving entry...';
                }

                // Best-effort delete of any photos removed during editing
                for (const path of window.photosMarkedForDeletion) {
                    try { await deleteObject(ref(storage, path)); } catch (e) { console.warn('Photo delete failed:', e); }
                }

                const photos = [...window.existingEntryPhotos, ...newlyUploaded];

                let updatedHistory;
                if (window.editingEntryId) {
                    updatedHistory = (p.caseHistory || []).map(e =>
                        e.id === window.editingEntryId ? { ...e, date, notes, paid, remaining, teeth, procedure, photos } : e
                    );
                } else {
                    updatedHistory = [...(p.caseHistory || []), { id: entryId, date, notes, paid, remaining, teeth, procedure, photos }];
                }

                const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                await setDoc(patientRef, { caseHistory: updatedHistory, updatedAt: serverTimestamp() }, { merge: true });
                window.editingEntryId = null;
                if (saveBtn) saveBtn.disabled = false;
                statusEl.classList.add('hidden');
                window.cancelAddCaseEntry();
            } catch (e) {
                if (saveBtn) saveBtn.disabled = false;
                statusEl.classList.add('hidden');
                console.error(e);
                window.showMessage('Save Failed', 'Could not save this entry. Please try again.', 'error');
            }
        };

        async function deletePhotosForEntry(entry) {
            if (!entry || !entry.photos || !storage) return;
            for (const ph of entry.photos) {
                try { await deleteObject(ref(storage, ph.path)); } catch (e) { console.warn('Photo delete failed:', e); }
            }
        }

        window.deleteCaseEntry = function(entryId) {
            window.showConfirm('Delete Entry', 'Are you sure you want to delete this case entry?', async () => {
                const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
                if (!p || !db) return;
                const entryToDelete = (p.caseHistory || []).find(e => e.id === entryId);
                const updatedHistory = (p.caseHistory || []).filter(e => e.id !== entryId);
                try {
                    const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                    await setDoc(patientRef, { caseHistory: updatedHistory, updatedAt: serverTimestamp() }, { merge: true });
                    await deletePhotosForEntry(entryToDelete);
                } catch (e) {
                    console.error(e);
                    window.showMessage('Delete Failed', 'Could not delete this entry. Please try again.', 'error');
                }
            });
        };

        window.deletePatientPrompt = function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p) return;
            window.showConfirm('Delete Patient', `This will permanently delete ${p.name} and their entire case history. Are you sure?`, async () => {
                try {
                    const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                    await deleteDoc(patientRef);
                    for (const entry of (p.caseHistory || [])) {
                        await deletePhotosForEntry(entry);
                    }
                    for (const ph of (p.generalPhotos || [])) {
                        try { await deleteObject(ref(storage, ph.path)); } catch (e) { console.warn('Photo delete failed:', e); }
                    }
                    window.backToPatientList();
                } catch (e) {
                    console.error(e);
                    window.showMessage('Delete Failed', 'Could not delete this patient. Please try again.', 'error');
                }
            });
        };


        window.toggleNameEdit = function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            const row = document.getElementById('name-edit-row');
            const input = document.getElementById('edit-name-input');
            const isHidden = row.classList.contains('hidden');
            if (isHidden) {
                input.value = (p && p.name) ? p.name : '';
                row.classList.remove('hidden');
                input.focus();
            } else {
                row.classList.add('hidden');
            }
        };

        window.savePatientName = async function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p || !db) return;
            const name = document.getElementById('edit-name-input').value.trim();
            if (!name) {
                window.showMessage('Missing Name', "Name can't be empty.", 'error');
                return;
            }

            const duplicates = window.allPatients.filter(x => x.id !== p.id && (x.name || '').trim().toLowerCase() === name.toLowerCase());
            if (duplicates.length > 0) {
                const existingList = duplicates.map(x => `#${x.patientId || '?'}${x.phone ? ' (' + x.phone + ')' : ''}`).join(', ');
                window.showConfirm(
                    'Possible Duplicate',
                    `Another patient named "${name}" already exists: ${existingList}. Rename this patient to "${name}" anyway?`,
                    () => actuallySavePatientName(p, name)
                );
                return;
            }
            actuallySavePatientName(p, name);
        };

        async function actuallySavePatientName(p, name) {
            try {
                const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                await setDoc(patientRef, { name, updatedAt: serverTimestamp() }, { merge: true });
                document.getElementById('name-edit-row').classList.add('hidden');
                window.showMessage('Saved', 'Patient name updated.', 'success');
            } catch (e) {
                console.error(e);
                window.showMessage('Save Failed', 'Could not save the name. Please try again.', 'error');
            }
        }

        window.togglePhoneEdit = function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            const row = document.getElementById('phone-edit-row');
            const input = document.getElementById('edit-phone-input');
            const isHidden = row.classList.contains('hidden');
            if (isHidden) {
                input.value = (p && p.phone) ? p.phone : '';
                row.classList.remove('hidden');
                input.focus();
            } else {
                row.classList.add('hidden');
            }
        };

        window.savePatientPhone = async function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p || !db) return;
            const phone = document.getElementById('edit-phone-input').value.trim();
            try {
                const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                await setDoc(patientRef, { phone, updatedAt: serverTimestamp() }, { merge: true });
                document.getElementById('phone-edit-row').classList.add('hidden');
                window.showMessage('Saved', 'Phone number updated.', 'success');
            } catch (e) {
                console.error(e);
                window.showMessage('Save Failed', 'Could not save the phone number. Please try again.', 'error');
            }
        };

        // Converts a local Iraqi number (e.g. "07701234567") into the international format
        // WhatsApp's click-to-chat link requires (e.g. "9647701234567"), leaving already-international
        // numbers untouched.

        function formatIraqiPhoneForWhatsApp(phone) {
            let digits = (phone || '').replace(/\D/g, '');
            if (!digits) return null;
            if (digits.startsWith('00')) digits = digits.slice(2);
            if (digits.startsWith('0')) digits = '964' + digits.slice(1);
            if (!digits.startsWith('964')) digits = '964' + digits;
            return digits;
        }

        const WHATSAPP_MESSAGES = {
            'تركيب': "تحية طيبة، معكم عيادة الدكتور فريد لطب الأسنان. لقد وصل تركيب الاسنان الخاص بكم. يرجى حجز موعدكم عبر هذا الرابط: https://xferidx.github.io/Dr.ferid.clinic/",
            'زراعة': "تحية طيبة، معكم عيادة الدكتور فريد لطب الأسنان. موعد الزراعة يوم الأربعاء بعد الساعة ال 8 مساءا. يرجى حجز موعدكم عبر الرابط https://xferidx.github.io/Dr.ferid.clinic/",
            'تقويم': "تحية طيبة، معكم عيادة الدكتور فريد لطب الأسنان. موعد التقويم الأربعاء بعد الساعة 8 مساءا. يرجى حجز موعدكم عبر الرابط https://xferidx.github.io/Dr.ferid.clinic/"
        };

        window.sendWhatsAppReminder = function(type) {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p) return;
            if (!p.phone || !p.phone.trim()) {
                window.showMessage('No Phone Number', 'Please add a phone number for this patient first.', 'error');
                return;
            }
            const whatsappNumber = formatIraqiPhoneForWhatsApp(p.phone);
            const message = WHATSAPP_MESSAGES[type] || WHATSAPP_MESSAGES['تركيب'];
            const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        };

        // Standalone patient photos — not tied to any single case entry, uploaded directly from the patient's page.

        window.handleGeneralPhotoSelect = async function(event) {
            const files = Array.from(event.target.files || []);
            event.target.value = '';
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p || !db || !storage || files.length === 0) return;

            try {
                const uploaded = [];
                for (let i = 0; i < files.length; i++) {
                    const blob = await compressImage(files[i]);
                    const path = `patient_photos/${p.id}/general/${Date.now()}_${i}.jpg`;
                    const storageRef = ref(storage, path);
                    await uploadBytes(storageRef, blob);
                    const url = await getDownloadURL(storageRef);
                    uploaded.push({ url, path });
                }
                const updatedPhotos = [...(p.generalPhotos || []), ...uploaded];
                const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                await setDoc(patientRef, { generalPhotos: updatedPhotos, updatedAt: serverTimestamp() }, { merge: true });
            } catch (e) {
                console.error(e);
                window.showMessage('Upload Failed', 'Could not upload photo(s). Please try again.', 'error');
            }
        };

        window.deleteGeneralPhoto = function(index) {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p) return;
            window.showConfirm('Delete Photo', 'Remove this photo?', async () => {
                const photos = [...(p.generalPhotos || [])];
                const removed = photos.splice(index, 1)[0];
                try {
                    const patientRef = doc(db, 'artifacts', appId, 'public', 'data', 'patient_records', p.id);
                    await setDoc(patientRef, { generalPhotos: photos, updatedAt: serverTimestamp() }, { merge: true });
                    if (removed && storage) {
                        try { await deleteObject(ref(storage, removed.path)); } catch (e) { console.warn('Photo delete failed:', e); }
                    }
                } catch (e) {
                    console.error(e);
                    window.showMessage('Delete Failed', 'Could not delete this photo. Please try again.', 'error');
                }
            });
        };

        // Builds a clean, old-index-card-style history sheet for a patient and opens it
        // as its own page — fast to scan, and printable if a paper copy is ever needed.

        window.openPatientSummary = function() {
            const p = window.allPatients.find(x => x.id === window.currentDetailPatientId);
            if (!p) return;

            const entries = [...(p.caseHistory || [])].sort((a, b) => (a.date || '').localeCompare(b.date || ''));
            let totalPaid = 0, totalRemaining = 0;
            const rows = entries.map(e => {
                totalPaid += Number(e.paid || 0);
                totalRemaining += Number(e.remaining || 0);
                const treatment = [e.teeth && e.teeth.length ? 'Teeth: ' + e.teeth.join(', ') : '', e.procedure || ''].filter(Boolean).join(' · ') || '—';
                return `<tr>
                    <td>${escapeHtml(e.date || '')}</td>
                    <td>${escapeHtml(treatment)}</td>
                    <td>${escapeHtml(e.notes || '')}</td>
                    <td class="paid">${Number(e.paid || 0).toLocaleString()}</td>
                    <td class="remaining">${e.remaining > 0 ? Number(e.remaining).toLocaleString() : '—'}</td>
                </tr>`;
            }).join('');

            const html = `<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(p.name)} — Patient Summary</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; background:#f4f1ea; color:#2b2b2b; margin:0; padding:24px; }
  .card { max-width: 800px; margin: 0 auto; background:#fffdf8; border: 2px solid #3a3226; border-radius: 6px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .clinic-name { text-align:center; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#8a7a5c; margin: 0 0 6px; }
  h1 { text-align:center; font-size:22px; margin: 0 0 20px; border-bottom: 2px solid #3a3226; padding-bottom:16px; }
  .info-row { display:flex; justify-content:space-between; font-size:14px; padding: 6px 0; border-bottom: 1px dashed #ccc; }
  .info-label { font-weight:bold; color:#5c5142; }
  table { width:100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
  th { text-align:left; border-bottom: 2px solid #3a3226; padding: 8px 6px; font-size: 11px; text-transform:uppercase; letter-spacing:0.5px; color:#5c5142; }
  td { padding: 10px 6px; border-bottom: 1px solid #ddd; vertical-align:top; }
  tr:nth-child(even) { background: #f7f3ea; }

  .remaining { color:#b3261e; font-weight:bold; white-space:nowrap; }

  .totals-label { text-align:right; }
  .print-btn { display:block; margin: 24px auto 0; padding: 10px 28px; background:#3a3226; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; font-family: inherit; }
  .print-btn:hover { background:#2b2419; }
  @media print { .print-btn { display:none; } body { background:#fff; padding:0; } .card { box-shadow:none; border:none; } }
</style>
</head>
<body>
  <div class="card">
    <p class="clinic-name">Dr. Ferid Dental Clinic</p>
    <h1>Patient History Sheet</h1>
    <div class="info-row"><span class="info-label">Name</span><span>${escapeHtml(p.name || '')}</span></div>
    <div class="info-row"><span class="info-label">Patient ID</span><span>${escapeHtml(p.patientId || '—')}</span></div>
    <div class="info-row"><span class="info-label">Phone</span><span>${escapeHtml(p.phone || '—')}</span></div>

    <table>
      <thead><tr><th>Date</th><th>Treatment</th><th>Notes</th><th>Paid</th><th>Remaining</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:#999;">No case history yet.</td></tr>'}</tbody>
      ${entries.length ? `<tfoot><tr><td colspan="3" class="totals-label">Totals</td><td class="paid">${totalPaid.toLocaleString()}</td><td class="remaining">${totalRemaining > 0 ? totalRemaining.toLocaleString() : '—'}</td></tr></tfoot>` : ''}
    </table>

    <button class="print-btn" onclick="window.print()">Print This Sheet</button>
  </div>
</body>
</html>`;

            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        };

        // Initialize application after all script assignments are completely loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // Register service worker for installability (Add to Home Screen) and offline shell caching
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed:', err));
            });
        }

        // The button is always visible. If the browser has a real install prompt ready, use it.
        // Otherwise (iOS Safari, or Android before the browser is ready to offer it) show clear
        // instructions instead of doing nothing when tapped.


        window.syncDarkModeIcon();
        initRecordsAuth();
    </script>
</body>
</html>
